<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Ledger Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --brandon: #3b82f6; --gina: #ec4899; 
            --need: #10b981; --want: #f59e0b; --goal: #8b5cf6;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); overflow-x: hidden;}
        
        #loginScreen, #app, #subManager, #mortgageModal { background: var(--card); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; width: 440px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin: 20px; box-sizing: border-box; }
        #app, #subManager, #mortgageModal { display: none; } 

        /* Payoff Clock Styling */
        .mortgage-vault { background: rgba(99, 102, 241, 0.1); border: 1px dashed rgba(99, 102, 241, 0.4); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; position: relative; }
        .clock-label { font-size: 0.65rem; font-weight: 800; color: #818cf8; text-transform: uppercase; letter-spacing: 1px; }
        .clock-time { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 5px 0; }
        .equity-tag { font-size: 0.75rem; color: #10b981; font-weight: 600; }

        .btn-settings { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; }
        .btn-settings:hover { color: #fff; }

        /* Rest of your Elite UI components */
        .balance-amount { font-size: 3.2rem; font-weight: 700; color: #fff; text-align: center; letter-spacing: -2px; margin-bottom: 5px;}
        .health-dashboard { background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
        .health-bar { display: flex; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .health-fill-need { background: var(--need); height: 100%; transition: width 0.5s ease; }
        .health-fill-want { background: var(--want); height: 100%; transition: width 0.5s ease; }
        .health-fill-goal { background: var(--goal); height: 100%; transition: width 0.5s ease; }
        
        .btn-elite { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); margin-bottom: 12px; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.8); color: white; font-size: 1rem; box-sizing: border-box; }
        
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .tag-row { display: flex; gap: 8px; align-items: center; }
        .intent-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div id="mortgageModal">
        <h3 style="margin-top:0;">Mortgage Setup</h3>
        <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:20px;">Input your loan details to calculate equity and payoff time.</p>
        <label style="font-size:0.7rem; font-weight:700;">Remaining Balance ($)</label>
        <input type="number" id="m_balance" placeholder="250000">
        <label style="font-size:0.7rem; font-weight:700;">Interest Rate (%)</label>
        <input type="number" id="m_rate" step="0.01" placeholder="6.5">
        <label style="font-size:0.7rem; font-weight:700;">Years Remaining</label>
        <input type="number" id="m_term" placeholder="30">
        <button class="btn-elite" onclick="saveMortgageSettings()">Save & Close</button>
    </div>

    <div id="loginScreen">
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; letter-spacing:12px; font-size: 2rem; margin: 20px 0;">
        <button class="btn-elite" onclick="checkPin()">Authorize Access</button>
    </div>

    <div id="app">
        <div id="mortgageDisplay" class="mortgage-vault" style="display:none;">
            <button class="btn-settings" onclick="toggleMortgageModal()"><i class="fa-solid fa-gear"></i></button>
            <div class="clock-label">Freedom Countdown</div>
            <div id="payoffClock" class="clock-time">-- Months</div>
            <div id="equityGain" class="equity-tag">-- Principal This Month</div>
        </div>
        
        <div id="setupPrompt" style="text-align:center; margin-bottom:20px;">
            <button class="btn-manage" style="margin:0; padding:10px;" onclick="toggleMortgageModal()">+ Setup Mortgage Tracking</button>
        </div>

        <div id="balance" class="balance-amount">$7,400</div>
        <div class="health-dashboard">
            <div class="health-bar">
                <div id="barNeed" class="health-fill-need"></div>
                <div id="barWant" class="health-fill-want"></div>
                <div id="barGoal" class="health-fill-goal"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
                <span style="color:var(--need)">Need: <span id="percNeed">0</span>%</span>
                <span style="color:var(--want)">Want: <span id="percWant">0</span>%</span>
                <span style="color:var(--goal)">Vault: <span id="percGoal">0</span>%</span>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="memberSelect"><option value="Brandon">Brandon</option><option value="Gina">Gina</option></select>
                <input type="number" id="amount" placeholder="0.00">
            </div>
            <select id="category" onchange="autoSuggest(this.value)">
                <option value="Mortgage">🏠 Mortgage</option>
                <option value="Car">🚗 Car Payment</option>
                <option value="Groceries">🛒 Groceries</option>
                <option value="Dining">🍔 Dining / Takeout</option>
                <option value="Subscription">📺 Subscription</option>
                <option value="Goal">🎯 Vault / Goal</option>
                <option value="Misc">📦 Miscellaneous</option>
            </select>
            <button id="recordBtn" class="btn-elite" onclick="addEntry()">Sync Transaction</button>
        </div>
        
        <div id="historyList" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

<script>
    const SUPABASE_URL = 'https://hieqohmhrpjvhotutwls.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_wfuqhxePYwqoxVixN0uSkg_9IUVRQHX'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MY_PIN = "1991"; 
    const INCOME = 7400.00; 

    let history = [], currentType = 'Need';
    let mortgageData = JSON.parse(localStorage.getItem('m_data')) || null;

    function toggleMortgageModal() {
        const modal = document.getElementById('mortgageModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        if(mortgageData) {
            document.getElementById('m_balance').value = mortgageData.balance;
            document.getElementById('m_rate').value = mortgageData.rate;
            document.getElementById('m_term').value = mortgageData.term;
        }
    }

    function saveMortgageSettings() {
        mortgageData = {
            balance: parseFloat(document.getElementById('m_balance').value),
            rate: parseFloat(document.getElementById('m_rate').value),
            term: parseInt(document.getElementById('m_term').value)
        };
        localStorage.setItem('m_data', JSON.stringify(mortgageData));
        document.getElementById('mortgageModal').style.display = 'none';
        updateUI();
    }

    function checkPin() { 
        if (document.getElementById('pinField').value === MY_PIN) { 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('app').style.display = 'block'; 
            fetchData(); 
        } else { alert("Access Denied"); } 
    }

    async function fetchData() {
        const { data } = await _supabase.from('transactions').select('*').order('created_at', { ascending: false });
        history = data || [];
        updateUI();
    }

    async function addEntry() {
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        const mem = document.getElementById('memberSelect').value;
        if (isNaN(amt) || amt <= 0) return;

        // If it's a mortgage payment, update the local balance tracking
        if (cat === 'Mortgage' && mortgageData) {
            const monthlyRate = (mortgageData.rate / 100) / 12;
            const interestPayment = mortgageData.balance * monthlyRate;
            const principalPayment = amt - interestPayment;
            mortgageData.balance -= principalPayment;
            localStorage.setItem('m_data', JSON.stringify(mortgageData));
        }

        await _supabase.from('transactions').insert([{ amount: amt, member: mem, category: cat, intent: currentType, created_at: new Date().toISOString() }]);
        document.getElementById('amount').value = ''; 
        fetchData();
    }

    function updateUI() {
        let totalSpent = 0, needS = 0, wantS = 0, goalS = 0;
        const list = document.getElementById('historyList'); 
        list.innerHTML = '';

        if (mortgageData) {
            document.getElementById('mortgageDisplay').style.display = 'block';
            document.getElementById('setupPrompt').style.display = 'none';
            document.getElementById('payoffClock').innerText = `${mortgageData.term * 12} Months Remaining`;
            
            // Calculating standard principal gain for display if a payment exists
            const lastMortgage = history.find(h => h.category === 'Mortgage');
            if(lastMortgage) {
                const interest = (mortgageData.balance + lastMortgage.amount) * ((mortgageData.rate/100)/12);
                const principal = lastMortgage.amount - interest;
                document.getElementById('equityGain').innerText = `+$${principal.toFixed(2)} Home Equity This Month`;
            }
        }

        history.forEach(item => {
            totalSpent += item.amount;
            if (item.category === 'Goal') goalS += item.amount;
            else if (item.intent === 'Want') wantS += item.amount;
            else needS += item.amount;

            const div = document.createElement('div'); div.className = 'history-item';
            const dotColor = item.intent === 'Want' ? 'var(--want)' : 'var(--need)';
            div.innerHTML = `<div><span class="intent-dot" style="background:${dotColor}"></span> <b>${item.category}</b></div><div>-$${item.amount.toFixed(2)}</div>`;
            list.appendChild(div);
        });

        const pNeed = Math.min(100, Math.round((needS / INCOME) * 100));
        const pWant = Math.min(100, Math.round((wantS / INCOME) * 100));
        const pGoal = Math.min(100, Math.round((goalS / INCOME) * 100));

        document.getElementById('barNeed').style.width = pNeed + '%';
        document.getElementById('barWant').style.width = pWant + '%';
        document.getElementById('barGoal').style.width = pGoal + '%';
        document.getElementById('percNeed').innerText = pNeed;
        document.getElementById('percWant').innerText = pWant;
        document.getElementById('percGoal').innerText = pGoal;
        document.getElementById('balance').innerText = "$" + (INCOME - totalSpent).toLocaleString();
    }
</script>
</body>
</html>
