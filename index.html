<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Family Budget Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            --dark: #0f172a; 
            --brandon: #3182ce; 
            --gina: #d53f8c; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            margin: 0; display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; padding: 40px 0; color: #1e293b;
        }
        
        #loginScreen, #app { 
            background: #ffffff; padding: 30px; border-radius: 28px; 
            width: 440px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        #loginScreen { text-align: center; width: 340px; margin-top: 10vh; }

        .balance-hero { 
            background: #f8fafc; padding: 20px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px; border: 1px solid #e2e8f0;
        }

        .chart-container { position: relative; height: 220px; margin-bottom: 25px; }

        .family-stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-pill { flex: 1; padding: 12px; border-radius: 16px; color: white; text-align: center; }

        label { display: block; margin-bottom: 6px; font-weight: 700; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem; background: #f8fafc;
        }

        .btn-primary { 
            background: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: 700; width: 100%;
            cursor: pointer; box-shadow: 0 10px 15px -3px rgba(102, 126, 234, 0.4);
        }

        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <i class="fa-solid fa-fingerprint fa-3x" style="color: #6366f1; margin-bottom: 20px;"></i>
        <h2>Family Vault</h2>
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; font-size: 2rem; border:none; background:#f1f5f9; letter-spacing:8px; width:150px; border-radius:10px; padding:10px; margin-bottom:20px;">
        <button class="btn-primary" onclick="checkPin()">Unlock</button>
    </div>

    <div id="app" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-weight: 800; font-size: 1.1rem;">Budget Analytics</span>
            <i class="fa-solid fa-circle-user fa-lg" style="color:#cbd5e1;"></i>
        </div>

        <div class="balance-hero">
            <div style="font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase;">Remaining Balance</div>
            <div id="balance" style="font-size: 2.4rem; font-weight: 800; letter-spacing: -1px;">$7,400.00</div>
        </div>

        <div class="chart-container">
            <canvas id="budgetChart"></canvas>
        </div>

        <div class="family-stats">
            <div class="stat-pill" style="background: var(--brandon);">
                <div style="font-size:0.6rem; opacity:0.8;">BRANDON</div>
                <div id="brandonSpend" style="font-weight:700;">$0</div>
            </div>
            <div class="stat-pill" style="background: var(--gina);">
                <div style="font-size:0.6rem; opacity:0.8;">GINA</div>
                <div id="ginaSpend" style="font-weight:700;">$0</div>
            </div>
        </div>

        <div style="background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 25px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <label>Member</label>
                    <select id="memberSelect">
                        <option value="Brandon">Brandon</option>
                        <option value="Gina">Gina</option>
                    </select>
                </div>
                <div>
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
            </div>
            <label>Category</label>
            <select id="category">
                <option value="Mortgage">🏠 Mortgage</option>
                <option value="Car">🚗 Car Payment/Ins</option>
                <option value="Groceries">🛒 Groceries</option>
                <option value="Gas">⛽ Gas / Travel</option>
                <option value="Utilities">💡 Utilities</option>
                <option value="Dining">🍔 Dining / Takeout</option>
                <option value="Misc">📦 Miscellaneous</option>
            </select>
            <button class="btn-primary" onclick="addEntry()">Record Expense</button>
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
            <span style="font-weight:700; font-size:0.9rem;">Recent History</span>
            <span onclick="clearHistory()" style="font-size:0.7rem; color:#ef4444; cursor:pointer;">Clear All</span>
        </div>
        <div id="historyList" style="max-height: 180px; overflow-y: auto;"></div>
    </div>

<script>
    const MY_PIN = "1991";
    const INCOME = 7400.00;
    let history = JSON.parse(localStorage.getItem('fam_history')) || [];
    let myChart;

    function checkPin() {
        if (document.getElementById('pinField').value === MY_PIN) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            initChart();
            updateDisplay();
        } else {
            alert("Wrong PIN");
        }
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Remaining', 'Mortgage', 'Car', 'Groceries', 'Gas', 'Utilities', 'Dining', 'Misc'],
                datasets: [{
                    data: [INCOME, 0, 0, 0, 0, 0, 0, 0],
                    backgroundColor: ['#e2e8f0', '#6366f1', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#f43f5e', '#64748b'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                cutout: '75%',
                plugins: { legend: { display: false } }
            }
        });
    }

    function addEntry() {
        const amt = document.getElementById('amount');
        const val = parseFloat(amt.value);
        if (isNaN(val) || val <= 0) return;

        history.unshift({
            amount: val,
            member: document.getElementById('memberSelect').value,
            category: document.getElementById('category').value,
            date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        });
        
        localStorage.setItem('fam_history', JSON.stringify(history));
        updateDisplay();
        amt.value = '';
    }

    function clearHistory() { if(confirm("Wipe data?")) { history = []; localStorage.setItem('fam_history', JSON.stringify(history)); updateDisplay(); } }

    function updateDisplay() {
        let totals = { Mortgage:0, Car:0, Groceries:0, Gas:0, Utilities:0, Dining:0, Misc:0 };
        let bSpend = 0, gSpend = 0, totalSpent = 0;
        
        const list = document.getElementById('historyList');
        list.innerHTML = '';

        history.forEach(item => {
            totalSpent += item.amount;
            if (item.member === "Brandon") bSpend += item.amount; else gSpend += item.amount;
            
            // Map long labels to short keys for chart
            let key = item.category.split(' ')[1] || "Misc";
            if(totals.hasOwnProperty(key)) totals[key] += item.amount; else totals.Misc += item.amount;

            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div><div style="font-weight:700; font-size:0.85rem;">${item.category}</div><div style="font-size:0.7rem; color:#94a3b8;">${item.date} • ${item.member}</div></div><div style="font-weight:700; color:#ef4444;">-$${item.amount.toFixed(2)}</div>`;
            list.appendChild(div);
        });

        const remaining = INCOME - totalSpent;
        document.getElementById('balance').innerText = "$" + remaining.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('brandonSpend').innerText = "$" + bSpend.toLocaleString();
        document.getElementById('ginaSpend').innerText = "$" + gSpend.toLocaleString();

        // Update Chart
        myChart.data.datasets[0].data = [remaining, totals.Mortgage, totals.Car, totals.Groceries, totals.Gas, totals.Utilities, totals.Dining, totals.Misc];
        myChart.update();
    }
</script>
</body>
</html>
