<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flint Finance | System Initializing</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --ink: #0f172a;
            --bright-yellow: #FFCC00; 
            --slate: #94a3b8;
        }

        body {
            background-color: var(--ink);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 35px rgba(255, 204, 0, 0.6); transform: scale(1.03); }
            100% { box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); transform: scale(1); }
        }

        .guardian-container {
            position: relative;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 3px solid var(--bright-yellow);
            margin-bottom: 30px;
            animation: pulseGlow 3s infinite ease-in-out;
            background-color: black;
        }

        .mascot-crop {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mascot-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .brand-ring text {
            fill: var(--bright-yellow);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 16px;
            filter: drop-shadow(0 0 5px rgba(255, 204, 0, 0.8));
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .highlight {
            color: var(--bright-yellow);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.7);
        }

        p {
            color: var(--slate);
            max-width: 450px;
            line-height: 1.6;
            font-size: 1.2rem;
            margin: 10px 0 40px 0;
        }

        .email-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 60px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--slate);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: var(--bright-yellow);
            color: var(--ink);
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--bright-yellow);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px var(--bright-yellow);
            background-color: #fff;
        }

        .admin-link {
            color: rgba(148, 163, 184, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .admin-link:hover { color: var(--bright-yellow); }
    </style>
</head>
<body>

    <div class="guardian-container">
        <div class="mascot-crop">
            <img src="mascot.jpg" alt="Guardian">
        </div>

        <svg class="brand-ring" viewBox="0 0 200 200">
            <path id="curve" d="M 30,100 A 70,70 0 1,1 170,100" fill="transparent" />
            <text width="200">
                <textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">
                    Flint Finance
                </textPath>
            </text>
        </svg>
    </div>

    <h1>System <span class="highlight">Offline</span></h1>
    
    <p>
        The Guardian is installing the <strong>Final Security Patch</strong>. 
        Reserve your position in the Empire Vault.
    </p>

    <div class="email-box">
        <input type="email" placeholder="Guardian access email..." required>
        <button>Reserve Position</button>
    </div>

    <a href="app.html" class="admin-link">Staff Login</a>

</body>
</html>
