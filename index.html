<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montoya Ledger Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary: linear-gradient(135deg, #4f46e5 0%, #7e22ce 100%);
            --brandon: #3b82f6; --gina: #ec4899; 
            --need: #10b981; --want: #f59e0b; --goal: #8b5cf6;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.75); 
            --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; min-height: 100vh; color: var(--text); overflow-x: hidden; }
        
        #offlineBanner { display: none; background: #ef4444; color: white; text-align: center; font-size: 0.75rem; font-weight: 700; padding: 8px; position: fixed; top: 0; left: 0; width: 100%; z-index: 3000; }
        #toastContainer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 80%; pointer-events: none; }
        .toast { background: var(--card); border: 1px solid var(--border); padding: 12px 20px; border-radius: 100px; color: white; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #loginScreen, #app, #subManager, #analyticsModal { 
            background: var(--card); backdrop-filter: blur(25px); padding: 30px 20px; 
            border-radius: 32px; width: 92%; max-width: 440px; 
            border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            margin: 20px auto; box-sizing: border-box; 
        }
        #app, #subManager, #analyticsModal { display: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 1000; }
        #settingsModal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e293b; border: 1px solid var(--border); padding: 30px 20px; border-radius: 32px;
            width: 90%; max-width: 400px; z-index: 1001; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header-stack { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px; }
        .logo-glow { width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px solid rgba(129, 140, 248, 0.3); color: #818cf8; }

        .cycle-selector { background: var(--primary); border: none; color: #fff; padding: 10px 20px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; width: fit-content; margin: 0 auto 15px auto; display: block; cursor: pointer; }
        .balance-amount { font-size: 3.2rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .pill-container { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .pace-pill { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 8px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; }
        .safe-pill { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }

        .vault-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mortgage-vault { background: rgba(99, 102, 241, 0.1); border: 1px dashed rgba(99, 102, 241, 0.4); border-radius: 20px; padding: 15px; text-align: center; }
        .clock-time { font-size: 1.3rem; font-weight: 700; color: #fff; margin-top: 5px; }

        .health-dashboard { background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
        .health-bar { display: flex; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .health-fill-need { background: var(--need); height: 100%; transition: width 0.5s; }
        .health-fill-want { background: var(--want); height: 100%; transition: width 0.5s; }
        .health-fill-goal { background: var(--goal); height: 100%; transition: width 0.5s; }

        .btn-elite { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4); margin-bottom: 12px; }
        .btn-manage { background: var(--secondary); color: white; border: none; padding: 16px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; margin-bottom: 20px; }

        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .item-amt { display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .trash-icon { color: #ef4444; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
        .trash-icon:hover { opacity: 1; }
        .clickable-tag { color: #c084fc; cursor: pointer; text-decoration: underline; font-weight: 700; }
        
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.5); color: white; font-size: 1rem; box-sizing: border-box; }
        .type-toggle { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        .type-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; background: transparent; color: #94a3b8; font-weight: 700; }
        .type-btn.active { background: white; color: #0f172a; }
    </style>
</head>
<body>

    <div id="offlineBanner">OFFLINE - SYNC PAUSED</div>
    <div id="toastContainer"></div>

    <div id="settingsOverlay" class="modal-overlay" onclick="toggleSettings()"></div>
    <div id="settingsModal">
        <h3 style="text-align:center;">Cloud Config</h3>
        <input type="number" id="conf_income" placeholder="Monthly Budget">
        <input type="number" id="conf_mbal" placeholder="Mortgage Balance">
        <input type="number" id="conf_cbal" placeholder="Car Balance">
        <button class="btn-elite" onclick="saveConfig()">Save to Cloud</button>
        <button onclick="toggleSettings()" style="width:100%; background:none; border:none; color:#94a3b8; cursor:pointer; padding:10px;">Close</button>
    </div>

    <div id="loginScreen">
        <div class="header-stack">
            <div class="logo-glow"><svg width="40" height="40" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg></div>
            <h2>Montoya Ledger</h2>
        </div>
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; letter-spacing:12px; font-size: 2rem;">
        <button class="btn-elite" onclick="checkPin()">Authorize Access</button>
    </div>

    <div id="app">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <button onclick="toggleAnalytics()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:600;"><i class="fa-solid fa-chart-line"></i> Analytics</button>
            <button onclick="toggleSettings()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:600;"><i class="fa-solid fa-cloud"></i> Config</button>
        </div>

        <select id="cycleSelect" class="cycle-selector" onchange="changeCycle()"></select>

        <div class="vault-grid">
            <div class="mortgage-vault">
                <div style="font-size:0.6rem; font-weight:800; color:#818cf8; text-transform:uppercase;">Mortgage</div>
                <div id="mortgageBalanceText" class="clock-time">$0.00</div>
            </div>
            <div class="mortgage-vault">
                <div style="font-size:0.6rem; font-weight:800; color:#818cf8; text-transform:uppercase;">Car Loan</div>
                <div id="carBalanceText" class="clock-time">$0.00</div>
            </div>
        </div>

        <div id="balance" class="balance-amount">$0.00</div>
        <div class="pill-container">
            <div id="paceDisplay" class="pace-pill">Pace: $0.00 / day</div>
            <div id="safeToSpend" class="pace-pill safe-pill">Safe: $0.00</div>
        </div>

        <div class="health-dashboard">
            <div class="health-bar">
                <div id="barNeed" class="health-fill-need" style="width: 0%;"></div>
                <div id="barWant" class="health-fill-want" style="width: 0%;"></div>
                <div id="barGoal" class="health-fill-goal" style="width: 0%;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:700;">
                <span style="color:var(--need)">NEED: <span id="percNeed">0</span>%</span>
                <span style="color:var(--want)">WANT: <span id="percWant">0</span>%</span>
                <span style="color:var(--goal)">VAULT: <span id="percGoal">0</span>%</span>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:25px;">
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:20px; text-align:center;">
                <div style="color:var(--brandon); font-size:0.6rem; font-weight:700;">BRANDON</div>
                <div id="brandonSpend" style="font-weight:700;">$0</div>
            </div>
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:20px; text-align:center;">
                <div style="color:var(--gina); font-size:0.6rem; font-weight:700;">GINA</div>
                <div id="ginaSpend" style="font-weight:700;">$0</div>
            </div>
        </div>

        <div style="background:rgba(0,0,0,0.2); padding:20px; border-radius:24px; border:1px solid var(--border); margin-bottom:25px;">
            <div class="type-toggle">
                <button id="needBtn" class="type-btn active" onclick="setType('Need')">NEED</button>
                <button id="wantBtn" class="type-btn" onclick="setType('Want')">WANT</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="memberSelect"><option value="Brandon">Brandon</option><option value="Gina">Gina</option></select>
                <input type="number" id="amount" placeholder="0.00" inputmode="decimal">
            </div>
            <select id="category" onchange="autoSuggest(this.value)">
                <option value="Mortgage">🏠 Mortgage</option>
                <option value="Car">🚗 Car Payment</option>
                <option value="Utilities">💡 Utilities</option>
                <option value="CreditCard">💳 Credit Card Payment</option>
                <option value="Phone">📱 Phone Bill</option>
                <option value="Groceries">🛒 Groceries</option>
                <option value="Dining">🍔 Dining / Takeout</option>
                <option value="Beauty">✂️ Beauty</option>
                <option value="Subscription">📺 Subscription</option>
                <option value="Goal">🎯 Vault / Goal</option>
                <option value="Misc">📦 Miscellaneous</option>
            </select>
            <input type="text" id="noteInput" placeholder="Note or #tags">
            <button class="btn-elite" onclick="addEntry()">Sync Transaction</button>
            <button class="btn-manage" onclick="toggleManager()">Manage Recurring Bills</button>
        </div>

        <input type="text" id="searchBar" placeholder="🔍 Search tags or category..." onkeyup="filterHistory()">
        <div id="historyList"></div>
    </div>

    <div id="subManager">
        <div class="header-stack">
            <h3>Recurring Bills</h3>
            <p style="font-size:0.7rem; color:#94a3b8;">Manage automated structural costs</p>
        </div>
        <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px; margin-bottom:20px;">
            <input type="text" id="subName" placeholder="Bill Name (e.g. Netflix)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="subAmt" placeholder="Amount">
                <input type="number" id="subDay" placeholder="Day (1-31)">
            </div>
            <button class="btn-elite" onclick="addSub()">Add New Bill</button>
        </div>
        <div id="subList"></div>
        <button class="btn-manage" onclick="toggleManager()" style="margin-top:20px; width:100%;">Back to Ledger</button>
    </div>

    <div id="analyticsModal" style="position:fixed; top:20px; z-index:2000; height: 90vh; overflow-y:auto;">
        <h3 style="text-align:center;">Cycle Analytics</h3>
        <div style="height:250px;"><canvas id="analyticsBarChart"></canvas></div>
        <button class="btn-manage" onclick="toggleAnalytics()" style="margin-top:20px;">Close</button>
    </div>

<script>
    const SUPABASE_URL = 'https://hieqohmhrpjvhotutwls.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_wfuqhxePYwqoxVixN0uSkg_9IUVRQHX'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MY_PIN = "1991"; 
    const CYCLE_START_DAY = 16;
    
    let history = [], recurring = [], currentType = 'Need';
    let config = { budget: 7400, m_balance: 0, c_balance: 0 };
    let currentViewDate = new Date();

    function showToast(msg) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast'; toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function setType(t) { 
        currentType = t;
        document.getElementById('needBtn').classList.toggle('active', t === 'Need');
        document.getElementById('wantBtn').classList.toggle('active', t === 'Want');
    }

    function autoSuggest(c) { 
        if(['Mortgage','Car','Utilities','CreditCard','Phone','Groceries','Subscription'].includes(c)) setType('Need'); 
        else setType('Want'); 
    }

    function toggleSettings() {
        const modal = document.getElementById('settingsModal'), overlay = document.getElementById('settingsOverlay');
        const isVisible = modal.style.display === 'block';
        modal.style.display = isVisible ? 'none' : 'block';
        overlay.style.display = isVisible ? 'none' : 'block';
        if(!isVisible) {
            document.getElementById('conf_income').value = config.budget;
            document.getElementById('conf_mbal').value = config.m_balance;
            document.getElementById('conf_cbal').value = config.c_balance;
        }
    }

    async function saveConfig() {
        config.budget = parseFloat(document.getElementById('conf_income').value);
        config.m_balance = parseFloat(document.getElementById('conf_mbal').value);
        config.c_balance = parseFloat(document.getElementById('conf_cbal').value);
        await _supabase.from('app_settings').upsert({ id: 1, ...config });
        showToast("Cloud Config Updated");
        toggleSettings();
        updateUI();
    }

    async function checkPin() { 
        if (document.getElementById('pinField').value === MY_PIN) { 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('app').style.display = 'block'; 
            const { data } = await _supabase.from('app_settings').select('*').eq('id', 1).single();
            if(data) config = data;
            initCycles(); await fetchData();
        } else { showToast("Access Denied"); } 
    }

    async function fetchData() {
        const { start, end } = getCycleDates(currentViewDate);
        const [transRes, recurRes] = await Promise.all([
            _supabase.from('transactions').select('*').gte('created_at', start.toISOString()).lt('created_at', end.toISOString()).order('created_at', { ascending: false }),
            _supabase.from('recurring_expenses').select('*')
        ]);
        history = transRes.data || [];
        recurring = recurRes.data || [];
        updateUI();
    }

    async function addEntry() {
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        const mem = document.getElementById('memberSelect').value;
        const note = document.getElementById('noteInput').value;
        if (isNaN(amt) || amt <= 0) return;

        if (cat === 'Mortgage') config.m_balance -= amt;
        if (cat === 'Car') config.c_balance -= amt;
        
        await Promise.all([
            _supabase.from('transactions').insert([{ amount: amt, member: mem, category: cat, note: note, intent: currentType, created_at: new Date().toISOString() }]),
            _supabase.from('app_settings').upsert({ id: 1, ...config })
        ]);

        showToast("Synced!");
        document.getElementById('amount').value = '';
        document.getElementById('noteInput').value = '';
        fetchData();
    }

    async function deleteEntry(id) {
        if (!confirm("Delete transaction?")) return;
        const item = history.find(h => h.id === id);
        if (item.category === 'Mortgage') config.m_balance += item.amount;
        if (item.category === 'Car') config.c_balance += item.amount;
        
        await Promise.all([
            _supabase.from('transactions').delete().eq('id', id),
            _supabase.from('app_settings').upsert({ id: 1, ...config })
        ]);
        fetchData();
    }

    function toggleManager() {
        const app = document.getElementById('app'), mgr = document.getElementById('subManager');
        if(app.style.display === 'none') { app.style.display = 'block'; mgr.style.display = 'none'; fetchData(); }
        else { app.style.display = 'none'; mgr.style.display = 'block'; renderSubList(); }
    }

    async function addSub() {
        const n = document.getElementById('subName').value, a = parseFloat(document.getElementById('subAmt').value), d = parseInt(document.getElementById('subDay').value);
        if(!n || isNaN(a)) return;
        await _supabase.from('recurring_expenses').insert([{ name: n, amount: a, billing_day: d }]);
        document.getElementById('subName').value = ''; document.getElementById('subAmt').value = ''; document.getElementById('subDay').value = '';
        const { data } = await _supabase.from('recurring_expenses').select('*');
        recurring = data;
        renderSubList();
    }

    async function deleteSub(id) {
        await _supabase.from('recurring_expenses').delete().eq('id', id);
        const { data } = await _supabase.from('recurring_expenses').select('*');
        recurring = data;
        renderSubList();
    }

    function renderSubList() {
        const list = document.getElementById('subList'); list.innerHTML = '';
        recurring.forEach(s => {
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `<div><b>${s.name}</b><br><small>Day ${s.billing_day}</small></div>
                             <div class="item-amt">$${s.amount.toFixed(2)} <i class="fa-solid fa-trash-can trash-icon" onclick="deleteSub('${s.id}')"></i></div>`;
            list.appendChild(div);
        });
    }

    function updateUI() {
        const { start, end } = getCycleDates(currentViewDate);
        let totalS = 0, needS = 0, wantS = 0, goalS = 0, bS = 0, gS = 0, pendingBills = 0;
        const list = document.getElementById('historyList'); list.innerHTML = '';

        document.getElementById('mortgageBalanceText').innerText = "$" + (config.m_balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('carBalanceText').innerText = "$" + (config.c_balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});

        history.forEach(item => {
            totalS += item.amount;
            if (!['Mortgage','Car','Utilities'].includes(item.category)) {
                if (item.member === 'Brandon') bS += item.amount; else gS += item.amount;
            }
            if (item.category === 'Goal') goalS += item.amount;
            else if (item.intent === 'Want') wantS += item.amount;
            else needS += item.amount;

            let displayNote = (item.note || item.category).replace(/(#[a-zA-Z0-9_]+)/g, `<span class="clickable-tag" onclick="quickSearch('$1')">$1</span>`);
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `<div><span class="name-tag tag-${item.member.toLowerCase()}">${item.member}</span><br><b>${displayNote}</b></div>
                             <div class="item-amt">-$${item.amount.toFixed(2)} <i class="fa-solid fa-trash-can trash-icon" onclick="deleteEntry('${item.id}')"></i></div>`;
            list.appendChild(div);
        });

        recurring.forEach(sub => {
            let billDate = new Date(start); if (sub.billing_day < CYCLE_START_DAY) billDate.setMonth(billDate.getMonth() + 1);
            billDate.setDate(sub.billing_day);
            const logged = history.some(h => h.note === sub.name || h.category === sub.name);
            if (!logged) {
                if (billDate <= new Date()) { 
                    totalS += sub.amount;
                    const div = document.createElement('div'); div.className = 'history-item'; div.style.opacity = '0.6';
                    div.innerHTML = `<div><span class="name-tag tag-auto">AUTO-SYNC</span><br><b>${sub.name}</b></div><div class="item-amt">-$${sub.amount.toFixed(2)}</div>`;
                    list.prepend(div);
                } else { pendingBills += sub.amount; }
            }
        });

        const INCOME = config.budget;
        document.getElementById('balance').innerText = "$" + (INCOME - totalS).toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('safeToSpend').innerText = "Safe: $" + (INCOME - totalS - pendingBills).toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('brandonSpend').innerText = "$" + bS.toLocaleString();
        document.getElementById('ginaSpend').innerText = "$" + gS.toLocaleString();

        document.getElementById('barNeed').style.width = ((needS/INCOME)*100) + '%';
        document.getElementById('barWant').style.width = ((wantS/INCOME)*100) + '%';
        document.getElementById('barGoal').style.width = ((goalS/INCOME)*100) + '%';
        
        document.getElementById('percNeed').innerText = Math.round((needS/INCOME)*100) + '%';
        document.getElementById('percWant').innerText = Math.round((wantS/INCOME)*100) + '%';
        document.getElementById('percGoal').innerText = Math.round((goalS/INCOME)*100) + '%';

        const daysLeft = Math.max(1, Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24)));
        document.getElementById('paceDisplay').innerText = `Pace: $${((INCOME - totalS) / daysLeft).toFixed(2)} / day`;
    }

    function getCycleDates(baseDate) {
        let d = new Date(baseDate); let start = new Date(d.getFullYear(), d.getMonth(), CYCLE_START_DAY);
        if (d.getDate() < CYCLE_START_DAY) start.setMonth(start.getMonth() - 1);
        let end = new Date(start); end.setMonth(end.getMonth() + 1);
        return { start, end };
    }

    function initCycles() {
        const select = document.getElementById('cycleSelect'); select.innerHTML = '';
        let now = new Date();
        for(let i=0; i<6; i++) {
            let d = new Date(now.getFullYear(), now.getMonth() - i, 16);
            let opt = document.createElement('option'); opt.value = d.toISOString();
            opt.text = d.toLocaleString('default', { month: 'short' }) + " Cycle";
            select.appendChild(opt);
        }
    }

    function filterHistory() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.history-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }

    function quickSearch(tag) { document.getElementById('searchBar').value = tag; filterHistory(); }
    function toggleAnalytics() { const m = document.getElementById('analyticsModal'); m.style.display = m.style.display==='block'?'none':'block'; }
