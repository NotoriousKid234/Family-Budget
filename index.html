<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montoya Ledger Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary: linear-gradient(135deg, #4f46e5 0%, #7e22ce 100%);
            --brandon: #3b82f6; --gina: #ec4899; 
            --need: #10b981; --want: #f59e0b; --goal: #8b5cf6;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.75); 
            --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; min-height: 100vh; color: var(--text); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Layout Structure */
        #container { width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        #loginScreen, #app, #subManager, #analyticsModal { 
            background: var(--card); backdrop-filter: blur(25px); padding: 30px 20px; 
            border-radius: 32px; width: 92%; max-width: 440px; 
            border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            margin: 20px auto; box-sizing: border-box; transition: transform 0.3s ease;
        }
        #app, #subManager, #analyticsModal { display: none; }

        /* Floating Action Button */
        #fab {
            position: fixed; bottom: 30px; right: 30px; width: 64px; height: 64px;
            background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5); color: white; font-size: 1.5rem;
            cursor: pointer; z-index: 900; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #fab:active { transform: scale(0.9); }

        /* Modals & Overlays */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 1000; animation: fadeIn 0.2s ease; }
        .custom-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e293b; border: 1px solid var(--border); padding: 30px 20px; border-radius: 32px;
            width: 90%; max-width: 400px; z-index: 1001; box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: slideUp 0.3s ease;
        }

        /* Notifications (Toasts) */
        #toastContainer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; width: 80%; pointer-events: none; }
        .toast {
            background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 100px; color: white; font-size: 0.85rem; font-weight: 600;
            text-align: center; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* UI Elements */
        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-header i { transition: transform 0.3s; color: #94a3b8; }
        .collapsed i { transform: rotate(-90deg); }
        .collapsible-content { overflow: hidden; transition: max-height 0.3s ease-out; max-height: 1000px; }
        
        .header-stack { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; margin-bottom: 20px; }
        .logo-glow { width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px solid rgba(129, 140, 248, 0.3); color: #818cf8; }

        .cycle-selector { background: var(--primary); border: none; color: #fff; padding: 10px 20px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; width: fit-content; margin: 0 auto 15px auto; display: block; }
        .balance-amount { font-size: 3.2rem; font-weight: 700; letter-spacing: -2px; }
        .pill-container { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .pace-pill { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 8px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; border: 1px solid transparent; }
        .safe-pill { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }

        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); animation: fadeInRow 0.4s ease forwards; }
        .name-tag { font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; }
        .tag-brandon { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .tag-gina { background: rgba(236, 72, 153, 0.15); color: #f472b6; }
        
        .btn-elite { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4); margin-bottom: 12px; }
        .clickable-tag { color: #c084fc; cursor: pointer; text-decoration: underline; font-weight: 700; }

        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.5); color: white; font-size: 1rem; box-sizing: border-box; }
        
        @keyframes slideInDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translate(-50%, 0%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div id="txOverlay" class="modal-overlay" onclick="closeTxModal()"></div>
    <div id="txModal" class="custom-modal">
        <h3 style="margin-top:0; text-align:center;">Sync New Transaction</h3>
        <div class="type-toggle" style="display:flex; background:rgba(0,0,0,0.3); padding:4px; border-radius:12px; margin-bottom:15px;">
            <button id="needBtn" class="type-btn active" onclick="setType('Need')" style="flex:1; border:none; padding:10px; border-radius:8px; cursor:pointer; background:white; font-weight:700;">NEED</button>
            <button id="wantBtn" class="type-btn" onclick="setType('Want')" style="flex:1; border:none; padding:10px; border-radius:8px; cursor:pointer; background:transparent; color:#94a3b8; font-weight:700;">WANT</button>
        </div>
        <select id="memberSelect"><option value="Brandon">Brandon</option><option value="Gina">Gina</option></select>
        <input type="number" id="amount" placeholder="0.00" inputmode="decimal">
        <select id="category" onchange="autoSuggest(this.value)">
            <option value="Mortgage">🏠 Mortgage</option>
            <option value="Car">🚗 Car Payment</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Groceries">🛒 Groceries</option>
            <option value="Dining">🍔 Dining / Takeout</option>
            <option value="Misc">📦 Miscellaneous</option>
            <option value="Goal">🎯 Vault / Goal</option>
        </select>
        <input type="text" id="noteInput" placeholder="Note or #tags (e.g. #PCBuild)">
        <button class="btn-elite" onclick="addEntry()">Confirm Transaction</button>
        <button onclick="closeTxModal()" style="width:100%; background:none; border:none; color:#94a3b8; cursor:pointer; padding:10px;">Cancel</button>
    </div>

    <div id="container">
        <div id="loginScreen">
            <div class="header-stack">
                <div class="logo-glow"><svg width="40" height="40" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg></div>
                <h2 style="margin:0;">Montoya Ledger</h2>
            </div>
            <div style="position: relative; margin: 20px 0;">
                <input type="password" id="pinField" placeholder="••••" style="text-align:center; letter-spacing:12px; font-size: 2rem;">
            </div>
            <button class="btn-elite" onclick="checkPin()">Authorize Access</button>
        </div>

        <div id="app">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <button onclick="toggleAnalytics()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:600;"><i class="fa-solid fa-chart-line"></i> Analytics</button>
                <button onclick="toggleSettings()" style="background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:600;"><i class="fa-solid fa-cloud"></i> Config</button>
            </div>

            <select id="cycleSelect" class="cycle-selector" onchange="changeCycle()"></select>

            <div class="collapsible-header" onclick="toggleCollapsible('vaults')">
                <span style="font-size:0.75rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Vault Reserves</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div id="vaults-content" class="collapsible-content vault-grid" style="margin-top:10px;">
                <div class="mortgage-vault">
                    <div style="font-size:0.6rem; font-weight:800; color:#818cf8; text-transform:uppercase;">Mortgage</div>
                    <div id="mortgageBalanceText" class="clock-time">$0.00</div>
                </div>
                <div class="mortgage-vault">
                    <div style="font-size:0.6rem; font-weight:800; color:#818cf8; text-transform:uppercase;">Car Loan</div>
                    <div id="carBalanceText" class="clock-time">$0.00</div>
                </div>
            </div>

            <div style="text-align: center; margin: 25px 0 5px 0;">
                <div id="balance" class="balance-amount">$0.00</div>
            </div>
            
            <div class="pill-container">
                <div id="paceDisplay" class="pace-pill">Pace: $0.00 / day</div>
                <div id="safeToSpend" class="pace-pill safe-pill">Safe: $0.00</div>
            </div>

            <div class="collapsible-header" onclick="toggleCollapsible('wealth')" style="margin-bottom:10px;">
                <span style="font-size:0.75rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Wealth Allocation</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div id="wealth-content" class="collapsible-content">
                <div class="health-dashboard">
                    <div class="health-bar">
                        <div id="barNeed" class="health-fill-need" style="width: 0%;"></div>
                        <div id="barWant" class="health-fill-want" style="width: 0%;"></div>
                        <div id="barGoal" class="health-fill-goal" style="width: 0%;"></div>
                    </div>
                    <div class="health-stats">
                        <span style="color:var(--need)">NEED: <span id="percNeed">0</span>%</span>
                        <span style="color:var(--want)">WANT: <span id="percWant">0</span>%</span>
                        <span style="color:var(--goal)">VAULT: <span id="percGoal">0</span>%</span>
                    </div>
                </div>
            </div>
            
            <div class="chart-container"><canvas id="budgetChart"></canvas></div>
            
            <div class="stat-group">
                <div class="stat-card"><div style="color:var(--brandon); font-size:0.6rem; font-weight:700;">BRANDON</div><div id="brandonSpend" style="font-weight:700;">$0</div></div>
                <div class="stat-card"><div style="color:var(--gina); font-size:0.6rem; font-weight:700;">GINA</div><div id="ginaSpend" style="font-weight:700;">$0</div></div>
            </div>

            <div class="toolbar-row">
                <div class="search-wrapper">
                    <input type="text" id="searchBar" placeholder="🔍 Search tags or category..." onkeyup="filterHistory()">
                </div>
            </div>
            
            <div id="historyList" style="max-height: 500px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="fab" onclick="openTxModal()"><i class="fa-solid fa-plus"></i></div>

<script>
    const SUPABASE_URL = 'https://hieqohmhrpjvhotutwls.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_wfuqhxePYwqoxVixN0uSkg_9IUVRQHX'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MY_PIN = "1991"; 
    const CYCLE_START_DAY = 16;
    
    let history = [], recurring = [], allTimeGoals = [], currentType = 'Need', myChart;
    let config = { budget: 7400, m_balance: 0, c_balance: 0 };
    let currentViewDate = new Date();

    /* UI Logic */
    function showToast(msg, isError = false) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        if(isError) toast.style.borderColor = '#ef4444';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleCollapsible(id) {
        const content = document.getElementById(id + '-content');
        const header = content.previousElementSibling;
        header.classList.toggle('collapsed');
        content.style.maxHeight = header.classList.contains('collapsed') ? '0' : '1000px';
    }

    function openTxModal() { document.getElementById('txOverlay').style.display = 'block'; document.getElementById('txModal').style.display = 'block'; }
    function closeTxModal() { document.getElementById('txOverlay').style.display = 'none'; document.getElementById('txModal').style.display = 'none'; }

    function setType(t) { 
        currentType = t;
        const nb = document.getElementById('needBtn'), wb = document.getElementById('wantBtn');
        if(t === 'Need') { nb.style.background = 'white'; nb.style.color = '#0f172a'; wb.style.background = 'transparent'; wb.style.color = '#94a3b8'; }
        else { wb.style.background = 'white'; wb.style.color = '#0f172a'; nb.style.background = 'transparent'; nb.style.color = '#94a3b8'; }
    }

    async function checkPin() { 
        if (document.getElementById('pinField').value === MY_PIN) { 
            document.getElementById('loginScreen').style.display = 'none'; document.getElementById('app').style.display = 'block'; 
            await fetchSettings(); initCycles(); initChart(); await fetchData();
            showToast("Authenticated: Syncing Cloud Data...");
        } else { showToast("Access Denied", true); } 
    }

    async function fetchSettings() {
        const { data } = await _supabase.from('app_settings').select('*').eq('id', 1).single();
        if (data) { config = data; }
    }

    async function fetchData() {
        const { start, end } = getCycleDates(currentViewDate);
        const [transRes, goalsRes, recurRes] = await Promise.all([
            _supabase.from('transactions').select('*').gte('created_at', start.toISOString()).lt('created_at', end.toISOString()).order('created_at', { ascending: false }),
            _supabase.from('transactions').select('amount, note').eq('category', 'Goal'),
            _supabase.from('recurring_expenses').select('*')
        ]);
        history = transRes.data || [];
        allTimeGoals = goalsRes.data || [];
        recurring = recurRes.data || [];
        updateUI();
    }

    async function addEntry() {
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        const mem = document.getElementById('memberSelect').value;
        const note = document.getElementById('noteInput').value;
        if (isNaN(amt) || amt <= 0) return;

        // Auto-vault deduction
        if (cat === 'Mortgage') config.m_balance -= amt;
        if (cat === 'Car') config.c_balance -= amt;
        
        await Promise.all([
            _supabase.from('transactions').insert([{ amount: amt, member: mem, category: cat, note: note, intent: currentType, created_at: new Date().toISOString() }]),
            _supabase.from('app_settings').upsert({ id: 1, ...config })
        ]);

        showToast("Transaction Synced Successfully");
        document.getElementById('amount').value = '';
        document.getElementById('noteInput').value = '';
        closeTxModal();
        fetchData();
    }

    async function deleteEntry(id) {
        if (!confirm("Permanently delete this record?")) return;
        const { data: item } = await _supabase.from('transactions').select('*').eq('id', id).single();
        if (item.category === 'Mortgage') config.m_balance += item.amount;
        if (item.category === 'Car') config.c_balance += item.amount;
        
        await Promise.all([
            _supabase.from('transactions').delete().eq('id', id),
            _supabase.from('app_settings').upsert({ id: 1, ...config })
        ]);
        showToast("Record Removed");
        fetchData();
    }

    function quickSearch(tag) { document.getElementById('searchBar').value = tag; filterHistory(); }

    function updateUI() {
        const { start, end } = getCycleDates(currentViewDate);
        let totalS = 0, needS = 0, wantS = 0, goalS = 0, bS = 0, gS = 0, pendingBills = 0;
        const list = document.getElementById('historyList'); list.innerHTML = '';

        document.getElementById('mortgageBalanceText').innerText = "$" + (config.m_balance || 0).toLocaleString();
        document.getElementById('carBalanceText').innerText = "$" + (config.c_balance || 0).toLocaleString();

        history.forEach(item => {
            totalS += item.amount;
            if (!['Mortgage','Car','Utilities'].includes(item.category)) {
                if (item.member === 'Brandon') bS += item.amount; else gS += item.amount;
            }
            if (item.category === 'Goal') goalS += item.amount;
            else if (item.intent === 'Want') wantS += item.amount;
            else needS += item.amount;

            let displayNote = (item.note || item.category).replace(/(#[a-zA-Z0-9_]+)/g, `<span class="clickable-tag" onclick="quickSearch('$1')">$1</span>`);
            
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `
                <div class="item-left">
                    <div class="tag-row"><span class="name-tag tag-${item.member.toLowerCase()}">${item.member}</span></div>
                    <span class="item-label" style="font-weight:700;">${displayNote}</span>
                </div>
                <div class="item-amt">-$${item.amount.toFixed(2)} <i class="fa-solid fa-trash-can" style="opacity:0.3; margin-left:10px;" onclick="deleteEntry('${item.id}')"></i></div>`;
            list.appendChild(div);
        });

        // Recurring Pending Logic
        recurring.forEach(sub => {
            let billDate = new Date(start); if (sub.billing_day < CYCLE_START_DAY) billDate.setMonth(billDate.getMonth() + 1);
            billDate.setDate(sub.billing_day);
            const logged = history.some(h => h.category === sub.name || h.note === sub.name);
            if (!logged && billDate > new Date() && billDate <= end) pendingBills += sub.amount;
        });

        const INCOME = config.budget;
        document.getElementById('balance').innerText = "$" + (INCOME - totalS).toLocaleString();
        document.getElementById('safeToSpend').innerText = "Safe: $" + (INCOME - totalS - pendingBills).toLocaleString();
        document.getElementById('brandonSpend').innerText = "$" + bS.toLocaleString();
        document.getElementById('ginaSpend').innerText = "$" + gS.toLocaleString();

        document.getElementById('barNeed').style.width = ((needS/INCOME)*100) + '%';
        document.getElementById('barWant').style.width = ((wantS/INCOME)*100) + '%';
        document.getElementById('barGoal').style.width = ((goalS/INCOME)*100) + '%';
        
        if(myChart) {
            myChart.data.datasets[0].data = [INCOME-totalS, totalS];
            myChart.update();
        }
    }

    function getCycleDates(baseDate) {
        let d = new Date(baseDate); let start = new Date(d.getFullYear(), d.getMonth(), CYCLE_START_DAY);
        if (d.getDate() < CYCLE_START_DAY) start.setMonth(start.getMonth() - 1);
        let end = new Date(start); end.setMonth(end.getMonth() + 1);
        return { start, end };
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [100, 0], backgroundColor: ['rgba(255,255,255,0.05)', '#6366f1'], borderWidth: 0 }] }, options: { cutout: '80%' } });
    }

    function initCycles() {
        const select = document.getElementById('cycleSelect');
        let now = new Date();
        for(let i=0; i<6; i++) {
            let d = new Date(now.getFullYear(), now.getMonth() - i, 16);
            let opt = document.createElement('option');
            opt.value = d.toISOString();
            opt.text = d.toLocaleString('default', { month: 'short' }) + " Cycle";
            select.appendChild(opt);
        }
    }

    function filterHistory() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.history-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
