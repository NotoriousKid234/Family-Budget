<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Ledger Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --brandon: #3b82f6; --gina: #ec4899; --need: #10b981; --want: #f59e0b; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); overflow-x: hidden; }
        #loginScreen, #app, #subManager { background: var(--card); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; width: 440px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin: 20px; box-sizing: border-box; }
        #app, #subManager { display: none; } 
        .header-stack { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; margin-bottom: 25px; }
        .logo-glow { width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px solid rgba(99, 102, 241, 0.3); box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); color: #818cf8; }
        .hero-section { text-align: center; margin-bottom: 25px; }
        .balance-amount { font-size: 3.2rem; font-weight: 700; color: #fff; letter-spacing: -2px; }
        .pace-pill { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 6px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-top: 10px; }
        .chart-container { position: relative; height: 180px; margin-bottom: 25px; }
        .stat-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .type-toggle { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--border); }
        .type-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: none; color: #94a3b8; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .type-btn.active { background: #fff; color: #0f172a; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.8); color: white; font-size: 1rem; box-sizing: border-box; }
        .btn-elite { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 0.8rem; }
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .action-icons { display: flex; gap: 12px; align-items: center; margin-left: 10px; }
        .edit-btn { color: #818cf8; cursor: pointer; opacity: 0.6; }
        .delete-btn { color: #ef4444; cursor: pointer; opacity: 0.6; }
        .edit-btn:hover, .delete-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="header-stack">
            <div class="logo-glow"><i class="fa-solid fa-shield-halved fa-3x"></i></div>
            <h2 style="margin:0; font-size: 1.5rem; font-weight: 700;">Montoya Ledger</h2>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">Elite Spending Control</p>
        </div>
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; letter-spacing:12px; font-size: 2rem; margin: 20px 0;">
        <button class="btn-elite" onclick="checkPin()">Authorize Access</button>
    </div>

    <div id="app">
        <div class="hero-section">
            <div id="balance" class="balance-amount">$7,400</div>
            <div id="paceDisplay" class="pace-pill">Pace: $0.00 / day</div>
        </div>
        <div class="chart-container"><canvas id="budgetChart"></canvas></div>
        <div class="stat-group">
            <div class="stat-card"><div style="color:var(--brandon); font-size:0.6rem; font-weight:700;">BRANDON</div><div id="brandonSpend" style="font-weight:700;">$0</div></div>
            <div class="stat-card"><div style="color:var(--gina); font-size:0.6rem; font-weight:700;">GINA</div><div id="ginaSpend" style="font-weight:700;">$0</div></div>
        </div>
        <div style="margin-bottom: 25px;">
            <div class="type-toggle"><button id="needBtn" class="type-btn active" onclick="setType('Need')">NEED</button><button id="wantBtn" class="type-btn" onclick="setType('Want')">WANT</button></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="memberSelect" onchange="this.style.color = this.value === 'Brandon' ? '#3b82f6' : '#ec4899';"><option value="Brandon">Brandon</option><option value="Gina">Gina</option></select>
                <input type="number" id="amount" placeholder="0.00">
            </div>
            <select id="category" onchange="autoSuggest(this.value)">
                <option value="Mortgage">🏠 Mortgage</option><option value="Car">🚗 Car Payment</option><option value="CreditCard">💳 Credit Card Payment</option><option value="Groceries">🛒 Groceries</option><option value="Dining">🍔 Dining / Takeout</option><option value="Utilities">💡 Utilities</option><option value="Beauty">✂️ Beauty</option><option value="Subscription">📺 Subscription</option><option value="Misc">📦 Miscellaneous</option>
            </select>
            <button id="recordBtn" class="btn-elite" onclick="addEntry()">Sync Transaction</button>
            <button class="btn-secondary" onclick="toggleManager()">Manage Recurring Bills</button>
        </div>
        <div id="historyList" style="max-height: 150px; overflow-y: auto;"></div>
    </div>

    <div id="subManager">
        <div class="header-stack">
            <h3 style="margin-top:0;">Recurring Bills</h3>
            <p style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 20px;">Cycle Control Panel</p>
        </div>
        <div id="subList" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px;"></div>
        <button class="btn-secondary" onclick="toggleManager()">Back to Dashboard</button>
    </div>

<script>
    const SUPABASE_URL = 'https://hieqohmhrpjvhotutwls.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_wfuqhxePYwqoxVixN0uSkg_9IUVRQHX'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MY_PIN = "1991"; const INCOME = 7400.00; const CYCLE_START_DAY = 16;
    let history = [], recurring = [], currentType = 'Need', myChart;

    function setType(t) { currentType = t; document.getElementById('needBtn').classList.toggle('active', t === 'Need'); document.getElementById('wantBtn').classList.toggle('active', t === 'Want'); }
    function autoSuggest(c) { setType(['Mortgage','Car','Utilities','Groceries','CreditCard','Subscription'].includes(c) ? 'Need' : 'Want'); }
    
    async function toggleManager() { 
        const app = document.getElementById('app');
        const manager = document.getElementById('subManager');
        if (app.style.display === 'none') { app.style.display = 'block'; manager.style.display = 'none'; await fetchData(); } 
        else { app.style.display = 'none'; manager.style.display = 'block'; await fetchData(); }
    }
    
    function getCycleDates() {
        let now = new Date();
        let start = new Date(now.getFullYear(), now.getMonth(), CYCLE_START_DAY, 0, 0, 0);
        if (now.getDate() < CYCLE_START_DAY) start.setMonth(start.getMonth() - 1);
        let end = new Date(start); end.setMonth(end.getMonth() + 1);
        return { start, end };
    }

    async function checkPin() {
        if (document.getElementById('pinField').value === MY_PIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.body.style.alignItems = 'flex-start'; document.body.style.paddingTop = '40px';
            initChart(); await fetchData();
        } else { alert("Access Denied"); }
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Remaining', 'Spent'], datasets: [{ data: [INCOME, 0], backgroundColor: ['rgba(255,255,255,0.05)', '#6366f1'], borderWidth: 0 }] }, options: { cutout: '80%', plugins: { legend: { display: false } } } });
    }

    async function fetchData() {
        const { start } = getCycleDates();
        const [transRes, recurRes] = await Promise.all([
            _supabase.from('transactions').select('*').gte('created_at', start.toISOString()).order('created_at', { ascending: false }),
            _supabase.from('recurring_expenses').select('*').order('name', { ascending: true })
        ]);
        history = transRes.data || []; recurring = recurRes.data || [];
        updateUI(); updateSubList();
    }

    async function addEntry() {
        const amtInput = document.getElementById('amount');
        const catInput = document.getElementById('category');
        const val = parseFloat(amtInput.value);
        if (isNaN(val) || val <= 0) return;
        document.getElementById('recordBtn').innerText = "Syncing...";

        if (catInput.value === 'Subscription') {
            const subName = prompt("Enter Subscription Name (e.g. Netflix, Gym):");
            const billDay = prompt(`What day of the month is this billed? (1-31):`, CYCLE_START_DAY);
            if (subName && billDay) {
                await _supabase.from('recurring_expenses').insert([{ 
                    name: subName, 
                    amount: val, 
                    billing_day: parseInt(billDay), 
                    member: document.getElementById('memberSelect').value 
                }]);
            }
        }

        await _supabase.from('transactions').insert([{ amount: val, member: document.getElementById('memberSelect').value, category: catInput.value, intent: currentType, created_at: new Date().toISOString() }]);
        amtInput.value = ''; await fetchData();
        document.getElementById('recordBtn').innerText = "Sync Transaction";
    }

    async function deleteEntry(id) { if (confirm("Delete?")) { await _supabase.from('transactions').delete().eq('id', id); await fetchData(); } }
    async function deleteSub(id) { if (confirm("Remove Bill?")) { await _supabase.from('recurring_expenses').delete().eq('id', id); await fetchData(); } }

    async function editSub(sub) {
        const newName = prompt("Edit Name:", sub.name);
        const newAmt = prompt("Edit Amount:", sub.amount);
        const newDay = prompt("Edit Billing Day:", sub.billing_day);
        if (newName && newAmt && newDay) {
            await _supabase.from('recurring_expenses').update({ 
                name: newName, 
                amount: parseFloat(newAmt), 
                billing_day: parseInt(newDay) 
            }).eq('id', sub.id);
            await fetchData();
        }
    }

    function updateSubList() {
        const list = document.getElementById('subList'); list.innerHTML = '';
        recurring.forEach(sub => {
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `
                <div style="flex:1;"><b>${sub.name}</b><br><small>Day ${sub.billing_day}</small></div>
                <div>$${sub.amount.toFixed(2)}</div>
                <div class="action-icons">
                    <i class="fa-solid fa-pen-to-square edit-btn" onclick='editSub(${JSON.stringify(sub)})'></i>
                    <i class="fa-solid fa-trash-can delete-btn" onclick="deleteSub('${sub.id}')"></i>
                </div>`;
            list.appendChild(div);
        });
    }

    function updateUI() {
        const { start, end } = getCycleDates();
        let totalSpent = history.reduce((sum, item) => sum + item.amount, 0);
        let bSpend = history.filter(i => i.member === 'Brandon').reduce((sum, i) => sum + i.amount, 0);
        let gSpend = history.filter(i => i.member === 'Gina').reduce((sum, i) => sum + i.amount, 0);
        
        const recurTotal = recurring.reduce((sum, sub) => {
            let billDate = new Date(new Date().getFullYear(), new Date().getMonth(), sub.billing_day);
            if (billDate >= start && billDate < end) return sum + sub.amount;
            return sum;
        }, 0);

        const remaining = INCOME - totalSpent - recurTotal;
        document.getElementById('balance').innerText = "$" + (remaining < 0 ? 0 : remaining).toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('brandonSpend').innerText = "$" + bSpend.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('ginaSpend').innerText = "$" + gSpend.toLocaleString(undefined, {minimumFractionDigits: 2});

        const daysLeft = Math.max(1, Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24)));
        document.getElementById('paceDisplay').innerText = `Pace: $${(remaining / daysLeft).toFixed(2)} / day`;
        
        const list = document.getElementById('historyList'); list.innerHTML = '';
        history.forEach(item => {
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `<div style="flex:1;"><b>${item.category}</b><br><small>${item.member}</small></div><div>-$${item.amount.toFixed(2)}</div><i class="fa-solid fa-trash-can delete-btn" onclick="deleteEntry('${item.id}')"></i>`;
            list.appendChild(div);
        });

        if(myChart) { myChart.data.datasets[0].data = [remaining < 0 ? 0 : remaining, totalSpent + recurTotal]; myChart.update(); }
    }
    document.getElementById('pinField').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPin(); });
</script>
</body>
</html>
