<script>
    // ... (Keep Supabase Config & Cycle Dates) ...

    async function addEntry() {
        const amtInput = document.getElementById('amount');
        const catInput = document.getElementById('category');
        const mem = document.getElementById('memberSelect').value;
        const val = parseFloat(amtInput.value);
        
        if (isNaN(val) || val <= 0) return;
        document.getElementById('recordBtn').innerText = "Syncing...";

        let note = prompt("Enter specific name (e.g. Netflix, Water Bill):");
        
        // If it's a sub, we handle the intelligent promotion
        if (catInput.value === 'Subscription') {
            const billDay = prompt(`What day of the month is this billed? (1-31):`, new Date().getDate());
            if (note && billDay) {
                await _supabase.from('recurring_expenses').insert([{ 
                    name: note, 
                    amount: val, 
                    billing_day: parseInt(billDay), 
                    member: mem 
                }]);
            }
        }

        // Add to history with the note preserved
        await _supabase.from('transactions').insert([{ 
            amount: val, 
            member: mem, 
            category: catInput.value, 
            note: note || '', 
            intent: currentType, 
            created_at: new Date().toISOString() 
        }]);

        amtInput.value = '';
        await fetchData();
        document.getElementById('recordBtn').innerText = "Sync Transaction";
    }

    function updateUI() {
        const { start, end } = getCycleDates();
        let bSpend = 0, gSpend = 0, totalSpent = 0;
        const list = document.getElementById('historyList'); list.innerHTML = '';

        // 1. PROCESS MANUAL TRANSACTIONS
        history.forEach(item => {
            totalSpent += item.amount;
            if (item.member === 'Brandon') bSpend += item.amount; else gSpend += item.amount;
            const d = new Date(item.created_at);
            
            const div = document.createElement('div'); div.className = 'history-item';
            
            // UNIFIED STYLE: Use Note as title if it exists, otherwise Category
            const displayTitle = item.note ? item.note : item.category;
            const displaySub = item.category === 'Subscription' ? 'Recurring Bill' : (item.note ? item.category : '');

            div.innerHTML = `
                <div class="item-left">
                    <div class="tag-row"><span class="name-tag tag-${item.member.toLowerCase()}">${item.member}</span><span class="date-tag">${d.getMonth()+1}/${d.getDate()}</span></div>
                    <span class="item-label">${displayTitle}</span>
                    <span class="item-note">${displaySub}</span>
                </div>
                <div class="item-amt">-$${item.amount.toFixed(2)} <i class="fa-solid fa-trash-can" style="color:#ef4444; opacity:0.3; cursor:pointer; margin-left:10px;" onclick="deleteEntry('${item.id}')"></i></div>`;
            list.appendChild(div);
        });

        // 2. PROCESS AUTO-SYNC RECURRING
        const recurTotal = recurring.reduce((sum, sub) => {
            let billDate = new Date(new Date().getFullYear(), new Date().getMonth(), sub.billing_day);
            
            if (billDate >= start && billDate < end) {
                // To avoid "Double Counting" on the day you first add it:
                // We only show AUTO-SYNC in history if it's NOT already in manual history for this cycle
                const alreadyLogged = history.some(h => h.note === sub.name && h.category === 'Subscription');

                if (billDate <= new Date() && !alreadyLogged) {
                    const div = document.createElement('div'); div.className = 'history-item'; div.style.opacity = "0.8";
                    div.innerHTML = `
                        <div class="item-left">
                            <div class="tag-row"><span class="name-tag tag-auto">AUTO-SYNC</span><span class="date-tag">${billDate.getMonth()+1}/${billDate.getDate()}</span></div>
                            <span class="item-label">${sub.name}</span>
                            <span class="item-note">Recurring Bill</span>
                        </div>
                        <div class="item-amt">-$${sub.amount.toFixed(2)} <i class="fa-solid fa-trash-can" style="color:#ef4444; opacity:0.3; cursor:pointer; margin-left:10px;" onclick="deleteSub('${sub.id}')"></i></div>`;
                    list.prepend(div);
                }
                return sum + sub.amount;
            }
            return sum;
        }, 0);

        // ... (Keep the rest of the UI update logic for balance/chart) ...
    }
</script>
