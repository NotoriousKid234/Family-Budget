<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Budget Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --primary: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            --brandon: #3182ce; --gina: #d53f8c; 
            --bg: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            --card: #ffffff; --text: #1e293b; --input: #f8fafc; --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: radial-gradient(circle at top right, #1e293b, #0f172a);
            --card: #1e293b; --text: #f8fafc; --input: #0f172a; --border: #334155;
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; 
            display: flex; justify-content: center; align-items: center; /* Vertical & Horizontal Center */
            min-height: 100vh; color: var(--text); transition: all 0.3s ease;
        }

        /* Container logic for Login vs App */
        #loginScreen { 
            background: var(--card); padding: 40px; border-radius: 28px; 
            width: 340px; text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            display: flex; flex-direction: column; align-items: center;
        }

        #app { 
            display: none; background: var(--card); padding: 30px; border-radius: 28px; 
            width: 440px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); margin: 20px;
        }

        /* Elements */
        .balance-hero { background: var(--input); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
        .chart-container { position: relative; height: 220px; margin-bottom: 25px; }
        .family-stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-pill { flex: 1; padding: 12px; border-radius: 16px; color: white; text-align: center; }

        label { display: block; margin-bottom: 6px; font-weight: 700; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; text-align: left; width: 100%; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 1rem; background: var(--input); color: var(--text); box-sizing: border-box; }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
        
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .hidden { display: none !important; }
        .cap-warning { color: #ef4444; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: none; text-align: left; width: 100%; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div style="background: #6366f1; width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);">
            <i class="fa-solid fa-fingerprint fa-2x" style="color: white;"></i>
        </div>
        <h2 style="margin: 0 0 8px 0;">Family Vault</h2>
        <p style="color: #94a3b8; font-size: 0.85rem; margin: 0 0 25px 0;">Secure Household Budget</p>
        
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; font-size: 2rem; letter-spacing:8px; border-radius:15px; margin-bottom:20px;">
        <button class="btn-primary" onclick="checkPin()">Unlock Dashboard</button>
    </div>

    <div id="app">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text); cursor:pointer;"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
            <span style="font-weight: 800; font-size: 1.1rem;">Budget Analytics</span>
            <button onclick="archiveMonth()" style="background:none; border:none; color:#10b981; cursor:pointer;"><i class="fa-solid fa-box-archive"></i></button>
        </div>

        <div class="balance-hero">
            <div id="balance" style="font-size: 2.4rem; font-weight: 800; letter-spacing: -1px;">$7,400.00</div>
        </div>

        <div class="chart-container"><canvas id="budgetChart"></canvas></div>

        <div class="family-stats">
            <div class="stat-pill" style="background: var(--brandon);"><div id="brandonSpend" style="font-weight:700;">$0</div></div>
            <div class="stat-pill" style="background: var(--gina);"><div id="ginaSpend" style="font-weight:700;">$0</div></div>
        </div>

        <div style="background: var(--input); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Member</label><select id="memberSelect"><option value="Brandon">Brandon</option><option value="Gina">Gina</option></select></div>
                <div><label>Amount</label><input type="number" id="amount" placeholder="0.00"></div>
            </div>
            <label>Category</label>
            <select id="category" onchange="checkCap()">
                <option value="Mortgage">🏠 Mortgage</option>
                <option value="Car">🚗 Car Payment</option>
                <option value="Groceries">🛒 Groceries</option>
                <option value="Dining">🍔 Dining / Takeout</option>
                <option value="Misc">📦 Miscellaneous</option>
            </select>
            <div id="capNotice" class="cap-warning">⚠️ MONTHLY LIMIT REACHED</div>
            <button class="btn-primary" onclick="addEntry()">Record Expense</button>
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
            <span style="font-weight:700; font-size:0.8rem;">Recent Activity</span>
            <span onclick="clearHistory()" style="font-size:0.7rem; color:#ef4444; cursor:pointer;">Clear All</span>
        </div>
        <div id="historyList" style="max-height: 180px; overflow-y: auto;"></div>
    </div>

<script>
    const MY_PIN = "1991";
    const INCOME = 7400.00;
    const CAPS = { Dining: 500, Misc: 300 };
    
    let history = JSON.parse(localStorage.getItem('fam_history')) || [];
    let myChart;

    function checkPin() {
        if (document.getElementById('pinField').value === MY_PIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            // Adjust body alignment for the dashboard scrolling
            document.body.style.alignItems = 'flex-start';
            document.body.style.paddingTop = '40px';
            
            initChart(); updateDisplay();
        } else { alert("Access Denied"); document.getElementById('pinField').value = ''; }
    }

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        document.getElementById('themeIcon').className = next === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Remaining', 'Mortgage', 'Car', 'Groceries', 'Dining', 'Misc'],
                datasets: [{
                    data: [INCOME, 0, 0, 0, 0, 0],
                    backgroundColor: ['#e2e8f0', '#6366f1', '#3b82f6', '#10b981', '#f43f5e', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    function checkCap() {
        const cat = document.getElementById('category').value;
        const notice = document.getElementById('capNotice');
        let currentSpend = 0;
        history.forEach(i => { if(i.category.includes(cat)) currentSpend += i.amount; });
        notice.style.display = (CAPS[cat] && currentSpend >= CAPS[cat]) ? 'block' : 'none';
    }

    function addEntry() {
        const amt = document.getElementById('amount');
        const val = parseFloat(amt.value);
        if (isNaN(val) || val <= 0) return;

        history.unshift({
            amount: val, member: document.getElementById('memberSelect').value,
            category: document.getElementById('category').value,
            date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        });
        
        localStorage.setItem('fam_history', JSON.stringify(history));
        updateDisplay(); checkCap();
        amt.value = '';
    }

    function archiveMonth() {
        if(confirm("Archive Month? Current spending will be reset.")) {
            clearHistory();
        }
    }

    function clearHistory() { history = []; localStorage.setItem('fam_history', JSON.stringify(history)); updateDisplay(); }

    function updateDisplay() {
        let totals = { Mortgage:0, Car:0, Groceries:0, Dining:0, Misc:0 };
        let bSpend = 0, gSpend = 0, totalSpent = 0;
        const list = document.getElementById('historyList');
        list.innerHTML = '';

        history.forEach(item => {
            totalSpent += item.amount;
            if (item.member === "Brandon") bSpend += item.amount; else gSpend += item.amount;
            let catName = item.category.replace(/[^\w\s]/gi, '').trim().split(' ')[0];
            if(totals.hasOwnProperty(catName)) totals[catName] += item.amount; else totals.Misc += item.amount;

            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div><div style="font-weight:700; font-size:0.85rem; color:var(--text);">${item.category}</div><div style="font-size:0.7rem; color:#94a3b8;">${item.member}</div></div><div style="font-weight:700; color:#ef4444;">-$${item.amount.toFixed(2)}</div>`;
            list.appendChild(div);
        });

        const remaining = INCOME - totalSpent;
        document.getElementById('balance').innerText = "$" + (remaining < 0 ? 0 : remaining).toLocaleString();
        document.getElementById('brandonSpend').innerText = "$" + bSpend.toLocaleString();
        document.getElementById('ginaSpend').innerText = "$" + gSpend.toLocaleString();

        if(myChart) {
            myChart.data.datasets[0].data = [remaining < 0 ? 0 : remaining, totals.Mortgage, totals.Car, totals.Groceries, totals.Dining, totals.Misc];
            myChart.update();
        }
    }

    // Allow Enter key to submit PIN
    document.getElementById('pinField').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPin();
    });
</script>
</body>
</html>
