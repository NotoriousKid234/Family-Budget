<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Budget Pro</title>
    <style>
        :root { --primary: #3182ce; --dark: #0e1621; --bg: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding-top: 50px; }
        
        /* Login Screen */
        #loginScreen { background: white; padding: 40px; border-radius: 16px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .pin-input { width: 100%; font-size: 2rem; text-align: center; letter-spacing: 10px; padding: 10px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 8px; }
        
        /* Main App (Hidden by default) */
        #app { display: none; background: white; padding: 30px; border-radius: 16px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 50px; }
        
        .balance-container { background: #f0f7ff; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 2px solid #cce3ff; }
        .balance-amount { font-size: 2.2rem; font-weight: bold; color: #2b6cb0; display: block; }
        
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #e2e8f0; box-sizing: border-box; font-size: 1rem; }
        .btn-add { background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; }
        .item-amt { color: #e53e3e; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Enter PIN</h2>
        <input type="password" id="pinField" class="pin-input" maxlength="4" placeholder="****">
        <button class="btn-add" onclick="checkPin()">Unlock Budget</button>
    </div>

    <div id="app">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">Montoya Budget</h3>
            <button onclick="logout()" style="width:auto; padding:5px 10px; font-size:0.7rem;">Lock</button>
        </div>
        <hr>
        <div class="balance-container">
            <span style="font-size:0.8rem; color:#5a67d8; font-weight:bold;">REMAINING</span>
            <span class="balance-amount">$<span id="balance">7,400.00</span></span>
        </div>
        
        <label>Amount:</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01">
        
        <label>Category:</label>
        <select id="category">
            <option>Mortgage</option>
            <option>Car Payment</option>
            <option>Car Insurance</option>
            <option>Groceries</option>
            <option>Gas / Travel</option>
            <option>Utilities</option>
            <option>Dining / Takeout</option>
            <option>Miscellaneous</option>
        </select>

        <button class="btn-add" onclick="addEntry()">Subtract Expense</button>

        <div id="historyList" style="max-height: 200px; overflow-y: auto; margin-top:20px;"></div>
    </div>

<script>
    const MY_PIN = "1991"; // Change this to your preferred 4-digit PIN
    const MONTHLY_INCOME = 7400.00;

    let total = localStorage.getItem('mont_budget') ? parseFloat(localStorage.getItem('mont_budget')) : MONTHLY_INCOME;
    let history = JSON.parse(localStorage.getItem('mont_history')) || [];

    function checkPin() {
        const entered = document.getElementById('pinField').value;
        if (entered === MY_PIN) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').style.display = 'block';
            updateDisplay();
        } else {
            alert("Incorrect PIN");
            document.getElementById('pinField').value = '';
        }
    }

    function logout() {
        location.reload(); // Quick way to lock the app again
    }

    function addEntry() {
        const amt = document.getElementById('amount');
        const val = parseFloat(amt.value);
        if (isNaN(val) || val <= 0) return;

        total -= val;
        history.unshift({ amount: val, category: document.getElementById('category').value, date: new Date().toLocaleDateString() });
        
        localStorage.setItem('mont_budget', total);
        localStorage.setItem('mont_history', JSON.stringify(history));
        updateDisplay();
        amt.value = '';
    }

    function updateDisplay() {
        document.getElementById('balance').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span><b>${item.category}</b><br><small>${item.date}</small></span><span class="item-amt">-$${item.amount.toFixed(2)}</span>`;
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
