<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Ledger Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --brandon: #3b82f6; --gina: #ec4899; 
            --need: #10b981; --want: #f59e0b; --goal: #8b5cf6;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); overflow-x: hidden;}
        #loginScreen, #app, #subManager, #settingsModal { background: var(--card); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; width: 440px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin: 20px; box-sizing: border-box; }
        #app, #subManager, #settingsModal { display: none; } 
        
        /* New Mortgage Freedom Clock UI */
        .mortgage-vault { background: rgba(99, 102, 241, 0.1); border: 1px dashed rgba(99, 102, 241, 0.4); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .clock-time { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 5px 0; }
        
        .header-stack { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; margin-bottom: 20px; }
        .logo-glow { width: 80px; height: 80px; background: rgba(99, 102, 241, 0.15); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px solid rgba(129, 140, 248, 0.4); box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); color: #818cf8; }

        .balance-amount { font-size: 3.2rem; font-weight: 700; color: #fff; text-align: center; letter-spacing: -2px; margin-bottom: 5px;}
        .pace-pill { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 6px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; display: block; width: fit-content; margin: 0 auto 20px auto; }

        .health-dashboard { background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
        .health-bar { display: flex; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .health-fill-need { background: var(--need); height: 100%; transition: width 0.5s ease; }
        .health-fill-want { background: var(--want); height: 100%; transition: width 0.5s ease; }
        .health-fill-goal { background: var(--goal); height: 100%; transition: width 0.5s ease; }
        
        /* New Recurring Toggle */
        .recur-toggle { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; color: #94a3b8; }

        .btn-elite { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5); margin-bottom: 12px; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.8); color: white; font-size: 1rem; box-sizing: border-box; }
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .intent-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="settingsModal">
        <h3 style="margin-top:0;">Ledger Config</h3>
        <label style="font-size:0.7rem; font-weight:700;">MONTHLY BUDGET ($)</label>
        <input type="number" id="conf_income" placeholder="7400">
        <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
        <label style="font-size:0.7rem; font-weight:700;">MORTGAGE BALANCE ($)</label>
        <input type="number" id="conf_mbal" placeholder="250000">
        <label style="font-size:0.7rem; font-weight:700;">INTEREST RATE (%)</label>
        <input type="number" id="conf_mrate" step="0.01" placeholder="6.5">
        <button class="btn-elite" onclick="saveConfig()">Save Configuration</button>
    </div>

    <div id="loginScreen">
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; letter-spacing:12px; font-size: 2rem; margin: 20px 0;">
        <button class="btn-elite" onclick="checkPin()">Authorize Access</button>
    </div>

    <div id="app">
        <div style="text-align:right; margin-bottom:10px;">
            <button onclick="toggleSettings()" style="background:none; border:none; color:#94a3b8; cursor:pointer;"><i class="fa-solid fa-gear"></i> Settings</button>
        </div>

        <div id="mortgageDisplay" class="mortgage-vault" style="display:none;">
            <div style="font-size:0.65rem; font-weight:800; color:#818cf8; text-transform:uppercase;">Freedom Countdown</div>
            <div id="payoffClock" class="clock-time">-- Months</div>
            <div id="equityGain" style="font-size:0.75rem; color:#10b981; font-weight:600;">-- Principal Gain</div>
        </div>

        <div id="balance" class="balance-amount">$0</div>
        <div id="paceDisplay" class="pace-pill">Pace: $0.00 / day</div>

        <div class="health-dashboard">
            <div class="health-bar">
                <div id="barNeed" class="health-fill-need" style="width: 0%;"></div>
                <div id="barWant" class="health-fill-want" style="width: 0%;"></div>
                <div id="barGoal" class="health-fill-goal" style="width: 0%;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
                <span style="color:var(--need)">Need: <span id="percNeed">0</span>%</span>
                <span style="color:var(--want)">Want: <span id="percWant">0</span>%</span>
                <span style="color:var(--goal)">Vault: <span id="percGoal">0</span>%</span>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <div class="recur-toggle">
                <span>Recurring Transaction?</span>
                <input type="checkbox" id="isRecurring" style="width:auto; margin:0;">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="memberSelect"><option value="Brandon">Brandon</option><option value="Gina">Gina</option></select>
                <input type="number" id="amount" placeholder="0.00">
            </div>
            <select id="category" onchange="autoSuggest(this.value)">
                <option value="Mortgage">🏠 Mortgage</option>
                <option value="Car">🚗 Car Payment</option>
                <option value="Groceries">🛒 Groceries</option>
                <option value="Dining">🍔 Dining</option>
                <option value="Subscription">📺 Subscription</option>
                <option value="Goal">🎯 Vault / Goal</option>
                <option value="Misc">📦 Miscellaneous</option>
            </select>
            <button class="btn-elite" onclick="addEntry()">Sync Transaction</button>
        </div>
        
        <div id="historyList" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

<script>
    const SUPABASE_URL = 'https://hieqohmhrpjvhotutwls.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_wfuqhxePYwqoxVixN0uSkg_9IUVRQHX'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const MY_PIN = "1991"; 

    let history = [], recurring = [], currentType = 'Need';
    let config = JSON.parse(localStorage.getItem('ledger_config')) || { budget: 7400, m_balance: 0, m_rate: 0 };

    function toggleSettings() {
        const modal = document.getElementById('settingsModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        document.getElementById('conf_income').value = config.budget;
        document.getElementById('conf_mbal').value = config.m_balance;
        document.getElementById('conf_mrate').value = config.m_rate;
    }

    function saveConfig() {
        config = {
            budget: parseFloat(document.getElementById('conf_income').value) || 0,
            m_balance: parseFloat(document.getElementById('conf_mbal').value) || 0,
            m_rate: parseFloat(document.getElementById('conf_mrate').value) || 0
        };
        localStorage.setItem('ledger_config', JSON.stringify(config));
        document.getElementById('settingsModal').style.display = 'none';
        updateUI();
    }

    function checkPin() { 
        if (document.getElementById('pinField').value === MY_PIN) { 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('app').style.display = 'block'; 
            fetchData(); 
        } else { alert("Access Denied"); } 
    }

    function autoSuggest(c) { currentType = ['Mortgage','Groceries','Subscription'].includes(c) ? 'Need' : 'Want'; }

    async function fetchData() {
        const { data: trans } = await _supabase.from('transactions').select('*').order('created_at', { ascending: false });
        history = trans || [];
        updateUI();
    }

    async function addEntry() {
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        const mem = document.getElementById('memberSelect').value;
        const isRecur = document.getElementById('isRecurring').checked;
        if (isNaN(amt) || amt <= 0) return;

        // Logic for Mortgage Principal Tracking
        if (cat === 'Mortgage' && config.m_balance > 0) {
            const interest = config.m_balance * ((config.m_rate / 100) / 12);
            const principal = amt - interest;
            config.m_balance -= principal;
            localStorage.setItem('ledger_config', JSON.stringify(config));
        }

        if (isRecur) {
            await _supabase.from('recurring_expenses').insert([{ name: cat, amount: amt, member: mem }]);
        }

        await _supabase.from('transactions').insert([{ amount: amt, member: mem, category: cat, intent: currentType, created_at: new Date().toISOString() }]);
        document.getElementById('amount').value = ''; 
        document.getElementById('isRecurring').checked = false;
        fetchData();
    }

    function updateUI() {
        let totalSpent = 0, needS = 0, wantS = 0, goalS = 0;
        const list = document.getElementById('historyList'); list.innerHTML = '';

        if (config.m_balance > 0) {
            document.getElementById('mortgageDisplay').style.display = 'block';
            const lastM = history.find(h => h.category === 'Mortgage');
            if (lastM) {
                const interest = (config.m_balance + lastM.amount) * ((config.m_rate / 100) / 12);
                document.getElementById('equityGain').innerText = `+$${(lastM.amount - interest).toFixed(2)} Equity Added`;
            }
        }

        history.forEach(item => {
            totalSpent += item.amount;
            if (item.category === 'Goal') goalS += item.amount;
            else if (item.intent === 'Want') wantS += item.amount;
            else needS += item.amount;

            const div = document.createElement('div'); div.className = 'history-item';
            const dotColor = item.intent === 'Want' ? 'var(--want)' : 'var(--need)';
            div.innerHTML = `<div><span class="intent-dot" style="background:${dotColor}"></span><b>${item.category}</b></div><div>-$${item.amount.toFixed(2)}</div>`;
            list.appendChild(div);
        });

        const remaining = config.budget - totalSpent;
        document.getElementById('balance').innerText = "$" + remaining.toLocaleString();
        
        const pNeed = Math.min(100, Math.round((needS / config.budget) * 100));
        const pWant = Math.min(100, Math.round((wantS / config.budget) * 100));
        const pGoal = Math.min(100, Math.round((goalS / config.budget) * 100));

        document.getElementById('barNeed').style.width = pNeed + '%';
        document.getElementById('barWant').style.width = pWant + '%';
        document.getElementById('barGoal').style.width = pGoal + '%';
        document.getElementById('percNeed').innerText = pNeed;
        document.getElementById('percWant').innerText = pWant;
        document.getElementById('percGoal').innerText = pGoal;

        const days = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - new Date().getDate() + 1;
        document.getElementById('paceDisplay').innerText = `Pace: $${(remaining / days).toFixed(2)} / day`;
    }
</script>
</body>
</html>
