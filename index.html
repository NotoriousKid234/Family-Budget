<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montoya Budget Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --brandon: #3b82f6; --gina: #ec4899; 
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: var(--text); overflow-x: hidden;
        }

        /* Glassmorphism Card */
        #loginScreen, #app { 
            background: var(--card); backdrop-filter: blur(20px); 
            padding: 40px; border-radius: 32px; width: 440px; 
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); margin: 20px;
        }

        /* CRITICAL FIX: Ensure app is hidden and doesn't take up space */
        #app { display: none; } 

        .hero-section { text-align: center; margin-bottom: 30px; }
        .balance-label { font-size: 0.75rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .balance-amount { font-size: 3.2rem; font-weight: 700; color: #fff; letter-spacing: -2px; }

        .pace-pill { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 6px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-top: 10px; }

        .chart-container { position: relative; height: 200px; margin: 20px 0; }

        .stat-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }

        input, select { 
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 16px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.2); 
            color: white; font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .btn-elite { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        .history-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div style="background: var(--primary); width: 70px; height: 70px; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);">
            <i class="fa-solid fa-bolt-lightning fa-2x" style="color: white;"></i>
        </div>
        <h2 style="margin: 0 0 10px 0; font-size: 1.8rem;">Elite Access</h2>
        <p style="color: #94a3b8; margin-bottom: 30px;">Welcome back, Brandon & Gina</p>
        <input type="password" id="pinField" placeholder="••••" style="text-align:center; letter-spacing:12px; font-size: 2.2rem;">
        <button class="btn-elite" onclick="checkPin()">Unlock Vault</button>
    </div>

    <div id="app">
        <div class="hero-section">
            <div class="balance-label">Household Remaining</div>
            <div id="balance" class="balance-amount">$7,400</div>
            <div id="paceDisplay" class="pace-pill">Pace: $238.00 / day</div>
        </div>

        <div class="chart-container"><canvas id="budgetChart"></canvas></div>

        <div class="stat-group">
            <div class="stat-card"><div style="color:var(--brandon); font-size:0.7rem; font-weight:700;">BRANDON</div><div id="brandonSpend" style="font-size:1.1rem; font-weight:700;">$0</div></div>
            <div class="stat-card"><div style="color:var(--gina); font-size:0.7rem; font-weight:700;">GINA</div><div id="ginaSpend" style="font-size:1.1rem; font-weight:700;">$0</div></div>
        </div>

        <div style="margin-bottom: 30px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="memberSelect"><option>Brandon</option><option>Gina</option></select>
                <input type="number" id="amount" placeholder="0.00">
            </div>
            <select id="category">
                <option value="Mortgage">🏠 Mortgage</option>
                <option value="Car">🚗 Car Payment</option>
                <option value="Groceries">🛒 Groceries</option>
                <option value="Dining">🍔 Dining / Takeout</option>
                <option value="Misc">📦 Miscellaneous</option>
            </select>
            <button class="btn-elite" onclick="addEntry()">Confirm Transaction</button>
        </div>

        <div id="historyList" style="max-height: 150px; overflow-y: auto;"></div>
    </div>

<script>
    const MY_PIN = "1991";
    const INCOME = 7400.00;
    let history = JSON.parse(localStorage.getItem('fam_history')) || [];
    let myChart;

    function checkPin() {
        if (document.getElementById('pinField').value === MY_PIN) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            initChart(); updateDisplay();
        } else { alert("Access Denied"); }
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Remaining', 'Mortgage', 'Car', 'Groceries', 'Dining', 'Misc'],
                datasets: [{
                    data: [INCOME, 0, 0, 0, 0, 0],
                    backgroundColor: ['rgba(255,255,255,0.05)', '#6366f1', '#3b82f6', '#10b981', '#f43f5e', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function addEntry() {
        const amt = document.getElementById('amount');
        const val = parseFloat(amt.value);
        if (isNaN(val) || val <= 0) return;
        history.unshift({
            amount: val, member: document.getElementById('memberSelect').value,
            category: document.getElementById('category').value,
            date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        });
        localStorage.setItem('fam_history', JSON.stringify(history));
        updateDisplay();
        amt.value = '';
    }

    function updateDisplay() {
        let totals = { Mortgage:0, Car:0, Groceries:0, Dining:0, Misc:0 };
        let bSpend = 0, gSpend = 0, totalSpent = 0;
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        history.forEach(item => {
            totalSpent += item.amount;
            if (item.member === "Brandon") bSpend += item.amount; else gSpend += item.amount;
            let catName = item.category.replace(/[^\w\s]/gi, '').trim().split(' ')[0];
            if(totals.hasOwnProperty(catName)) totals[catName] += item.amount; else totals.Misc += item.amount;
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div><b>${item.category}</b><br><small>${item.member}</small></div><div>-$${item.amount.toFixed(2)}</div>`;
            list.appendChild(div);
        });
        const remaining = INCOME - totalSpent;
        document.getElementById('balance').innerText = "$" + (remaining < 0 ? 0 : remaining).toLocaleString();
        document.getElementById('brandonSpend').innerText = "$" + bSpend.toLocaleString();
        document.getElementById('ginaSpend').innerText = "$" + gSpend.toLocaleString();
        const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
        const pace = remaining / (daysInMonth - new Date().getDate() + 1);
        document.getElementById('paceDisplay').innerText = `Pace: $${pace.toFixed(2)} / day`;
        if(myChart) {
            myChart.data.datasets[0].data = [remaining < 0 ? 0 : remaining, totals.Mortgage, totals.Car, totals.Groceries, totals.Dining, totals.Misc];
            myChart.update();
        }
    }
</script>
</body>
</html>
